<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meylio — Modération</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Meylio — Modération</h1>
    <div class="filters">
      <select id="status-filter">
        <option value="pending">En attente</option>
        <option value="action_taken">Traités (suspendus)</option>
        <option value="dismissed">Rejetés</option>
        <option value="all">Tous</option>
      </select>
      <button id="refresh-button">Rafraîchir</button>
    </div>
  </header>

  <main id="app">
    <div id="key-gate" class="key-gate">
      <p>Clé d'accès admin requise</p>
      <input id="admin-key-input" type="password" placeholder="Clé admin" />
      <button id="key-submit">Entrer</button>
      <p id="key-error" class="error"></p>
    </div>

    <div id="reports-list" class="reports-list hidden"></div>
    <p id="empty-message" class="empty hidden">Aucun signalement dans cette catégorie.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
